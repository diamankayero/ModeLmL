name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Rapide et toujours fiable : capture la grande majorité des régressions
  # (imports cassés, erreurs de rendu des pages statiques, lint).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # Plus lourd : vérifie l'intégration réelle avec l'API (repo séparé,
  # trainedml-webapp) en pilotant un vrai navigateur à travers la vitrine
  # et les cinq écrans de l'atelier (scripts/visual-check.mjs).
  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout ModeLmL
        uses: actions/checkout@v4
        with:
          path: modelml

      - name: Checkout trainedml-webapp
        uses: actions/checkout@v4
        with:
          repository: diamankayero/trainedml-webapp
          path: trainedml-webapp

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: trainedml-webapp/requirements.txt

      - name: Installer les dépendances de l'API
        working-directory: trainedml-webapp
        run: pip install -r requirements.txt

      - name: Démarrer l'API (trainedml, en tâche de fond)
        working-directory: trainedml-webapp
        run: |
          nohup uvicorn api:app --host 0.0.0.0 --port 8000 > api.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/models > /dev/null && exit 0
            sleep 2
          done
          echo "L'API n'a pas démarré :" && cat api.log && exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: modelml/package-lock.json

      - name: Installer les dépendances de l'app
        working-directory: modelml
        run: npm ci

      - name: Construire l'app contre l'API locale
        working-directory: modelml
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Démarrer l'app (en tâche de fond)
        working-directory: modelml
        run: |
          nohup npm run start -- --port 3000 > next.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ > /dev/null && exit 0
            sleep 2
          done
          echo "L'app n'a pas démarré :" && cat next.log && exit 1

      - name: Installer un navigateur pour les scripts de capture
        working-directory: modelml
        run: node scripts/ci/install-browser.mjs

      - name: Vérification visuelle (vitrine + 5 écrans de l'atelier)
        working-directory: modelml
        env:
          APP_URL: http://localhost:3000
          SHOT_DIR: /tmp/shots
        run: |
          mkdir -p /tmp/shots
          node scripts/visual-check.mjs

      - name: Publier les captures (preuve visuelle, même en cas d'échec)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-check-screenshots
          path: /tmp/shots
          retention-days: 14
